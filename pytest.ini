[pytest]
# pytest配置文件
testpaths = tests
pythonpath = .
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*
addopts = 
    --verbose
    --tb=short
    --strict-markers
    --disable-warnings
markers =
    unit: 单元测试
    integration: 集成测试
    slow: 慢速测试
    network: 需要网络连接的测试
    security: 安全相关测试
    performance: 性能测试
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
